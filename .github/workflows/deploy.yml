name: Deploy apps to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'connection-hub/dist/**'
      - 'medwrite-ai/dist/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp -r connection-hub/dist/. _site/
          mkdir -p _site/medwrite-ai
          cp -r medwrite-ai/dist/. _site/medwrite-ai/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
